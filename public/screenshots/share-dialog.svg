<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Share link dialog mockup">
  <rect width="1440" height="900" fill="#0a0a0b"/>
  <!-- Faded background of asset detail -->
  <rect x="0" y="0" width="220" height="900" fill="#111114" opacity="0.5"/>
  <rect x="220" y="0" width="1220" height="56" fill="#0e0e10" opacity="0.5"/>
  <rect x="252" y="180" width="700" height="160" rx="12" fill="#111114" stroke="#1f2937" opacity="0.4"/>
  <rect x="252" y="356" width="700" height="220" rx="12" fill="#111114" stroke="#1f2937" opacity="0.4"/>
  <rect x="980" y="316" width="380" height="240" rx="12" fill="#111114" stroke="#1f2937" opacity="0.4"/>

  <!-- Backdrop -->
  <rect width="1440" height="900" fill="#000" opacity="0.5"/>

  <!-- Modal -->
  <rect x="450" y="120" width="540" height="660" rx="14" fill="#111114" stroke="#1f2937" stroke-width="1.5"/>
  <line x1="450" y1="180" x2="990" y2="180" stroke="#1f2937"/>

  <g fill="#3b82f6"><rect x="476" y="142" width="14" height="14" rx="3"/></g>
  <text x="500" y="156" fill="#e5e7eb" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Share Links</text>
  <text x="970" y="156" fill="#9ca3af" font-family="Inter, system-ui, sans-serif" font-size="14" text-anchor="end">×</text>

  <!-- Description -->
  <text x="476" y="216" fill="#9ca3af" font-family="Inter, system-ui, sans-serif" font-size="11">Generate a read-only link anyone can open without signing in. The link only shows</text>
  <text x="476" y="232" fill="#9ca3af" font-family="Inter, system-ui, sans-serif" font-size="11">non-sensitive renewal info — license keys, IPs and project details are hidden.</text>

  <!-- One-time banner -->
  <rect x="476" y="252" width="488" height="80" rx="10" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-opacity="0.3"/>
  <text x="492" y="276" fill="#e5e7eb" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500">Copy this link now — for security we won't show it again.</text>
  <rect x="492" y="288" width="456" height="32" rx="6" fill="#0e0e10" stroke="#1f2937"/>
  <text x="504" y="308" fill="#e5e7eb" font-family="ui-monospace, monospace" font-size="10">renewpilot.app/share/Ac8j-_kF1Yn7XQp9_VxLm6e2-rQpZqV…</text>
  <rect x="908" y="294" width="34" height="20" rx="4" fill="#3b82f6"/>
  <text x="925" y="308" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">📋</text>

  <!-- Form -->
  <text x="476" y="372" fill="#e5e7eb" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500">Label <tspan fill="#9ca3af" font-weight="normal">optional</tspan></text>
  <rect x="476" y="384" width="488" height="36" rx="8" fill="#1f2937" stroke="#1f2937"/>
  <text x="492" y="408" fill="#9ca3af" font-family="Inter, system-ui, sans-serif" font-size="11">Sent to Acme Inc.</text>

  <text x="476" y="448" fill="#e5e7eb" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500">Expires</text>
  <rect x="476" y="460" width="488" height="36" rx="8" fill="#1f2937" stroke="#1f2937"/>
  <text x="492" y="484" fill="#e5e7eb" font-family="Inter, system-ui, sans-serif" font-size="11">In 30 days</text>
  <text x="940" y="484" fill="#9ca3af" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="end">▾</text>

  <rect x="476" y="512" width="130" height="36" rx="8" fill="#3b82f6"/>
  <text x="541" y="535" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" text-anchor="middle">Create link</text>

  <!-- Existing links -->
  <text x="476" y="588" fill="#e5e7eb" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="1">EXISTING LINKS</text>

  <g font-family="Inter, system-ui, sans-serif">
    <rect x="476" y="600" width="488" height="64" rx="8" fill="#0e0e10" stroke="#1f2937"/>
    <text x="492" y="624" fill="#e5e7eb" font-size="12" font-weight="500">Sent to Acme Inc.</text>
    <text x="492" y="642" fill="#6b7280" font-size="10">Created 2026-04-25 · Hamza Ç.</text>
    <text x="492" y="658" fill="#9ca3af" font-size="10">👁 12 views · Expires 2026-05-25</text>
    <text x="940" y="640" fill="#ef4444" font-size="11" text-anchor="end">🗑</text>

    <rect x="476" y="676" width="488" height="64" rx="8" fill="#0e0e10" stroke="#1f2937" opacity="0.7"/>
    <text x="492" y="700" fill="#9ca3af" font-size="12" font-weight="500">Untitled link</text>
    <text x="492" y="718" fill="#6b7280" font-size="10">Created 2026-04-12 · Hamza Ç.</text>
    <text x="492" y="734" fill="#6b7280" font-size="10">👁 4 views · </text>
    <text x="556" y="734" fill="#ef4444" font-size="10">Revoked</text>
  </g>
</svg>
