<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Notification settings mockup">
  <rect width="1440" height="900" fill="#0a0a0b"/>
  <rect x="0" y="0" width="220" height="900" fill="#111114"/>
  <g fill="#3b82f6"><rect x="20" y="22" width="14" height="14" rx="3"/></g>
  <text x="42" y="36" fill="#e5e7eb" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">RenewPilot</text>
  <g font-family="Inter, system-ui, sans-serif" font-size="12" fill="#9ca3af">
    <text x="44" y="100">Dashboard</text>
    <text x="44" y="138">Assets</text>
    <text x="44" y="170">Calendar</text>
    <text x="44" y="202">Renewals</text>
    <rect x="14" y="342" width="192" height="32" rx="6" fill="#1f2937"/>
    <text x="44" y="362" fill="#e5e7eb" font-weight="500">Settings</text>
  </g>

  <rect x="220" y="0" width="1220" height="56" fill="#0e0e10"/>
  <line x1="220" y1="56" x2="1440" y2="56" stroke="#1f2937"/>
  <text x="252" y="34" fill="#e5e7eb" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Settings</text>

  <text x="252" y="98" fill="#e5e7eb" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">Settings</text>

  <!-- Tabs -->
  <g font-family="Inter, system-ui, sans-serif" font-size="12">
    <rect x="252" y="128" width="1128" height="40" rx="8" fill="#0e0e10" stroke="#1f2937"/>
    <text x="280" y="153" fill="#9ca3af">Profile</text>
    <text x="360" y="153" fill="#9ca3af">Security</text>
    <text x="450" y="153" fill="#9ca3af">Language</text>
    <rect x="535" y="134" width="130" height="28" rx="6" fill="#3b82f6"/>
    <text x="600" y="153" fill="#fff" text-anchor="middle" font-weight="500">Notifications</text>
    <text x="690" y="153" fill="#9ca3af">Team</text>
    <text x="750" y="153" fill="#9ca3af">Billing</text>
  </g>

  <!-- Channels card -->
  <rect x="252" y="192" width="1128" height="240" rx="12" fill="#111114" stroke="#1f2937"/>
  <text x="272" y="222" fill="#e5e7eb" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Notification channels</text>
  <text x="272" y="240" fill="#9ca3af" font-family="Inter, system-ui, sans-serif" font-size="11">Where do you want renewal reminders to land?</text>

  <g font-family="Inter, system-ui, sans-serif" font-size="12">
    <!-- Email -->
    <rect x="272" y="262" width="528" height="64" rx="8" fill="#0e0e10" stroke="#1f2937"/>
    <text x="288" y="290" fill="#e5e7eb" font-weight="500">📧 Email</text>
    <text x="288" y="310" fill="#9ca3af" font-size="11">hamza@renewpilot.app</text>
    <rect x="744" y="280" width="40" height="22" rx="11" fill="#3b82f6"/>
    <circle cx="773" cy="291" r="9" fill="#fff"/>

    <!-- SMS -->
    <rect x="816" y="262" width="528" height="64" rx="8" fill="#0e0e10" stroke="#1f2937"/>
    <text x="832" y="290" fill="#e5e7eb" font-weight="500">📱 SMS</text>
    <text x="832" y="310" fill="#9ca3af" font-size="11">+90 ••• ••• 4321</text>
    <rect x="1288" y="280" width="40" height="22" rx="11" fill="#3b82f6"/>
    <circle cx="1317" cy="291" r="9" fill="#fff"/>

    <!-- WhatsApp -->
    <rect x="272" y="338" width="528" height="64" rx="8" fill="#0e0e10" stroke="#1f2937"/>
    <text x="288" y="366" fill="#e5e7eb" font-weight="500">💬 WhatsApp</text>
    <text x="288" y="386" fill="#9ca3af" font-size="11">+90 ••• ••• 4321</text>
    <rect x="744" y="356" width="40" height="22" rx="11" fill="#1f2937"/>
    <circle cx="755" cy="367" r="9" fill="#9ca3af"/>

    <!-- Web push -->
    <rect x="816" y="338" width="528" height="64" rx="8" fill="#0e0e10" stroke="#1f2937"/>
    <text x="832" y="366" fill="#e5e7eb" font-weight="500">🔔 Web push</text>
    <text x="832" y="386" fill="#10b981" font-size="11">Active on this device</text>
    <rect x="1288" y="356" width="40" height="22" rx="11" fill="#3b82f6"/>
    <circle cx="1317" cy="367" r="9" fill="#fff"/>
  </g>

  <!-- Reminder timing -->
  <rect x="252" y="448" width="1128" height="220" rx="12" fill="#111114" stroke="#1f2937"/>
  <text x="272" y="478" fill="#e5e7eb" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Reminder timing</text>
  <text x="272" y="496" fill="#9ca3af" font-family="Inter, system-ui, sans-serif" font-size="11">When should we ping you before a renewal date?</text>

  <g font-family="Inter, system-ui, sans-serif" font-size="11">
    <rect x="272" y="518" width="100" height="60" rx="8" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-opacity="0.4"/>
    <text x="322" y="540" fill="#3b82f6" text-anchor="middle" font-weight="600" font-size="22">30</text>
    <text x="322" y="562" fill="#3b82f6" text-anchor="middle" font-size="10">DAYS</text>

    <rect x="386" y="518" width="100" height="60" rx="8" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-opacity="0.4"/>
    <text x="436" y="540" fill="#3b82f6" text-anchor="middle" font-weight="600" font-size="22">14</text>
    <text x="436" y="562" fill="#3b82f6" text-anchor="middle" font-size="10">DAYS</text>

    <rect x="500" y="518" width="100" height="60" rx="8" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-opacity="0.4"/>
    <text x="550" y="540" fill="#3b82f6" text-anchor="middle" font-weight="600" font-size="22">7</text>
    <text x="550" y="562" fill="#3b82f6" text-anchor="middle" font-size="10">DAYS</text>

    <rect x="614" y="518" width="100" height="60" rx="8" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-opacity="0.4"/>
    <text x="664" y="540" fill="#3b82f6" text-anchor="middle" font-weight="600" font-size="22">1</text>
    <text x="664" y="562" fill="#3b82f6" text-anchor="middle" font-size="10">DAY</text>

    <rect x="728" y="518" width="100" height="60" rx="8" fill="#0e0e10" stroke="#1f2937"/>
    <text x="778" y="540" fill="#6b7280" text-anchor="middle" font-weight="600" font-size="22">+</text>
    <text x="778" y="562" fill="#6b7280" text-anchor="middle" font-size="10">ADD</text>
  </g>

  <text x="272" y="610" fill="#6b7280" font-family="Inter, system-ui, sans-serif" font-size="11">Quiet hours: 22:00 — 08:00 (Europe/Istanbul)</text>
  <text x="272" y="630" fill="#6b7280" font-family="Inter, system-ui, sans-serif" font-size="11">Critical reminders bypass quiet hours.</text>

  <rect x="1248" y="630" width="120" height="32" rx="6" fill="#3b82f6"/>
  <text x="1308" y="650" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" text-anchor="middle">Save changes</text>
</svg>
