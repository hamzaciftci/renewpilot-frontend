<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Dashboard mockup">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0b"/>
      <stop offset="100%" stop-color="#0e0e10"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="900" fill="url(#bg)"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="220" height="900" fill="#111114"/>
  <g fill="#3b82f6"><rect x="20" y="22" width="14" height="14" rx="3"/></g>
  <text x="42" y="36" fill="#e5e7eb" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">RenewPilot</text>

  <g font-family="Inter, system-ui, sans-serif" font-size="12" fill="#9ca3af">
    <rect x="14" y="80" width="192" height="32" rx="6" fill="#1f2937"/>
    <text x="44" y="100" fill="#e5e7eb" font-weight="500">Dashboard</text>
    <text x="44" y="138" >Assets</text>
    <text x="44" y="170">Calendar</text>
    <text x="44" y="202">Renewals</text>
    <text x="44" y="234">Reports</text>
    <text x="44" y="266">Notifications</text>
    <text x="44" y="298">Team</text>
    <text x="44" y="330">Billing</text>
    <text x="44" y="362">Settings</text>
  </g>

  <!-- Top bar -->
  <rect x="220" y="0" width="1220" height="56" fill="#0e0e10"/>
  <line x1="220" y1="56" x2="1440" y2="56" stroke="#1f2937" stroke-width="1"/>
  <text x="252" y="34" fill="#e5e7eb" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Dashboard</text>
  <rect x="1140" y="14" width="240" height="28" rx="6" fill="#1f2937"/>
  <text x="1156" y="32" fill="#6b7280" font-family="Inter, system-ui, sans-serif" font-size="11">Search assets…</text>
  <circle cx="1410" cy="28" r="14" fill="#1f2937"/>

  <!-- Stat cards -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="252" y="88" width="280" height="118" rx="12" fill="#111114" stroke="#1f2937"/>
    <text x="272" y="118" fill="#6b7280" font-size="10" font-weight="500">EXPIRING IN 7 DAYS</text>
    <text x="272" y="160" fill="#ef4444" font-size="36" font-weight="700">04</text>
    <text x="272" y="184" fill="#9ca3af" font-size="11">Needs attention</text>

    <rect x="552" y="88" width="280" height="118" rx="12" fill="#111114" stroke="#1f2937"/>
    <text x="572" y="118" fill="#6b7280" font-size="10" font-weight="500">EXPIRING IN 30 DAYS</text>
    <text x="572" y="160" fill="#f59e0b" font-size="36" font-weight="700">12</text>
    <text x="572" y="184" fill="#9ca3af" font-size="11">Plan ahead</text>

    <rect x="852" y="88" width="280" height="118" rx="12" fill="#111114" stroke="#1f2937"/>
    <text x="872" y="118" fill="#6b7280" font-size="10" font-weight="500">TOTAL ASSETS</text>
    <text x="872" y="160" fill="#e5e7eb" font-size="36" font-weight="700">87</text>
    <text x="872" y="184" fill="#9ca3af" font-size="11">Across 4 projects</text>

    <rect x="1152" y="88" width="228" height="118" rx="12" fill="#111114" stroke="#1f2937"/>
    <text x="1172" y="118" fill="#6b7280" font-size="10" font-weight="500">MONTHLY SPEND</text>
    <text x="1172" y="160" fill="#e5e7eb" font-size="32" font-weight="700">€ 2,140</text>
    <text x="1172" y="184" fill="#10b981" font-size="11">▼ 4% vs last month</text>
  </g>

  <!-- Forecast chart -->
  <rect x="252" y="232" width="600" height="240" rx="12" fill="#111114" stroke="#1f2937"/>
  <text x="272" y="262" fill="#e5e7eb" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">Renewal cost forecast</text>
  <text x="272" y="280" fill="#6b7280" font-family="Inter, system-ui, sans-serif" font-size="10">Next 6 months</text>
  <g stroke="#1f2937" stroke-width="1">
    <line x1="272" y1="440" x2="832" y2="440"/>
    <line x1="272" y1="400" x2="832" y2="400"/>
    <line x1="272" y1="360" x2="832" y2="360"/>
    <line x1="272" y1="320" x2="832" y2="320"/>
  </g>
  <g fill="url(#accent)">
    <rect x="290" y="380" width="60" height="60" rx="3"/>
    <rect x="380" y="340" width="60" height="100" rx="3"/>
    <rect x="470" y="370" width="60" height="70" rx="3"/>
    <rect x="560" y="320" width="60" height="120" rx="3"/>
    <rect x="650" y="360" width="60" height="80" rx="3"/>
    <rect x="740" y="350" width="60" height="90" rx="3"/>
  </g>

  <!-- Upcoming list -->
  <rect x="872" y="232" width="508" height="240" rx="12" fill="#111114" stroke="#1f2937"/>
  <text x="892" y="262" fill="#e5e7eb" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">Upcoming renewals</text>
  <g font-family="Inter, system-ui, sans-serif" font-size="11">
    <line x1="892" y1="284" x2="1360" y2="284" stroke="#1f2937"/>
    <text x="892" y="306" fill="#e5e7eb" font-weight="500">acme.com</text>
    <text x="892" y="320" fill="#6b7280" font-size="10">DOMAIN · GoDaddy</text>
    <text x="1330" y="312" text-anchor="end" fill="#ef4444" font-weight="600">3d</text>

    <line x1="892" y1="338" x2="1360" y2="338" stroke="#1f2937"/>
    <text x="892" y="360" fill="#e5e7eb" font-weight="500">*.acme.com SSL</text>
    <text x="892" y="374" fill="#6b7280" font-size="10">SSL · Let's Encrypt</text>
    <text x="1330" y="366" text-anchor="end" fill="#f59e0b" font-weight="600">11d</text>

    <line x1="892" y1="392" x2="1360" y2="392" stroke="#1f2937"/>
    <text x="892" y="414" fill="#e5e7eb" font-weight="500">Linear · 12 seats</text>
    <text x="892" y="428" fill="#6b7280" font-size="10">LICENSE · Annual</text>
    <text x="1330" y="420" text-anchor="end" fill="#10b981" font-weight="600">28d</text>

    <line x1="892" y1="446" x2="1360" y2="446" stroke="#1f2937"/>
    <text x="892" y="460" fill="#9ca3af" font-size="10">View all →</text>
  </g>

  <!-- Recent activity -->
  <rect x="252" y="496" width="1128" height="380" rx="12" fill="#111114" stroke="#1f2937"/>
  <text x="272" y="526" fill="#e5e7eb" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">Recent activity</text>
  <g font-family="Inter, system-ui, sans-serif" font-size="11">
    <g transform="translate(272, 552)">
      <circle cx="6" cy="6" r="4" fill="#10b981"/>
      <text x="20" y="10" fill="#e5e7eb">Renewed mail.acme.com SSL · 90 days extended</text>
      <text x="800" y="10" fill="#6b7280" font-size="10">2 hours ago</text>
    </g>
    <g transform="translate(272, 588)">
      <circle cx="6" cy="6" r="4" fill="#3b82f6"/>
      <text x="20" y="10" fill="#e5e7eb">Reminder sent: acme.com domain expires in 3 days</text>
      <text x="800" y="10" fill="#6b7280" font-size="10">Today, 09:14</text>
    </g>
    <g transform="translate(272, 624)">
      <circle cx="6" cy="6" r="4" fill="#f59e0b"/>
      <text x="20" y="10" fill="#e5e7eb">SSL discovered via WHOIS auto-detect: api.acme.com</text>
      <text x="800" y="10" fill="#6b7280" font-size="10">Yesterday</text>
    </g>
    <g transform="translate(272, 660)">
      <circle cx="6" cy="6" r="4" fill="#3b82f6"/>
      <text x="20" y="10" fill="#e5e7eb">Lara invited as ADMIN to RenewPilot organization</text>
      <text x="800" y="10" fill="#6b7280" font-size="10">2 days ago</text>
    </g>
    <g transform="translate(272, 696)">
      <circle cx="6" cy="6" r="4" fill="#10b981"/>
      <text x="20" y="10" fill="#e5e7eb">Renewed Vercel Pro · €240</text>
      <text x="800" y="10" fill="#6b7280" font-size="10">3 days ago</text>
    </g>
  </g>
</svg>
